<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KRCG Design Tools</title>
    <style>
        @font-face {
            font-family: 'ABC Arizona Sans';
            src: url('Assets/ABC%20Arizona%20Sans/ABCArizonaSans-Regular-Trial.woff2') format('woff2'),
                 url('Assets/ABC%20Arizona%20Sans/ABCArizonaSans-Regular-Trial.woff') format('woff');
            font-weight: 400;
            font-style: normal;
        }

        @font-face {
            font-family: 'ABC Arizona Sans';
            src: url('Assets/ABC%20Arizona%20Sans/ABCArizonaSans-Medium-Trial.woff2') format('woff2'),
                 url('Assets/ABC%20Arizona%20Sans/ABCArizonaSans-Medium-Trial.woff') format('woff');
            font-weight: 500;
            font-style: normal;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        html, body {
            height: 100%;
            overflow: hidden;
            font-family: 'ABC Arizona Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            font-weight: 500;
            background: #001450;
            color: #82CDFF;
        }

        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 48px;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .logo-icon {
            width: 28px;
            height: 36px;
        }

        .logo-title {
            font-size: 18px;
            color: #82CDFF;
        }

        .tools {
            display: flex;
            gap: 24px;
        }

        .tool-card {
            width: 200px;
            background: #001963;
            border: 1px solid #0a2373;
            border-radius: 6px;
            padding: 24px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 16px;
            text-decoration: none;
            color: #82CDFF;
            transition: border-color 0.2s;
            cursor: pointer;
        }

        .tool-card:hover {
            border-color: #82CDFF;
        }

        .tool-icon {
            width: 48px;
            height: 48px;
            background: #001450;
            border: 1px solid #0a2373;
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .tool-name {
            font-size: 12px;
            font-weight: 500;
            text-align: center;
        }

        .branding {
            position: fixed;
            bottom: 24px;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        @media (max-width: 500px) {
            .tools {
                flex-direction: column;
                gap: 16px;
            }

            .tool-card {
                width: 180px;
            }
        }
    </style>
</head>
<body>
    <div class="logo">
        <svg class="logo-icon" viewBox="0 0 14 18" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M6.71299 17.291C6.14792 17.291 5.31163 16.9181 4.2041 16.1722C3.11917 15.4263 2.14725 14.5109 1.28835 13.426C0.429451 12.3411 0 11.3013 0 10.3068V2.5767C0 2.10205 0.226027 1.77431 0.67808 1.59349C1.44657 1.25445 2.44109 0.904106 3.66163 0.542463C4.90478 0.180821 5.9219 0 6.71299 0C7.50408 0 8.5099 0.180821 9.73045 0.542463C10.9736 0.904106 11.9794 1.25445 12.7479 1.59349C13.2 1.77431 13.426 2.10205 13.426 2.5767V5.9332L10.4763 5.0856V2.5428L11.5274 3.86505C10.6459 3.50341 9.75305 3.19828 8.84894 2.94965C7.94484 2.70102 7.23285 2.5767 6.71299 2.5767C6.19313 2.5767 5.48115 2.70102 4.57704 2.94965C3.67293 3.19828 2.78013 3.50341 1.89862 3.86505L2.94965 2.71232V10.1034C2.94965 10.4424 3.09657 10.8719 3.3904 11.3917C3.70684 11.889 4.12499 12.3863 4.64485 12.8835C5.16471 13.3582 5.71847 13.7311 6.30614 14.0023L6.44176 14.0363C6.55477 14.0815 6.64518 14.1041 6.71299 14.1041C6.7808 14.1041 6.87121 14.0815 6.98422 14.0363L7.11984 14.0023C7.70751 13.7311 8.26127 13.3582 8.78113 12.8835C9.301 12.3863 9.70784 11.889 10.0017 11.3917C10.3181 10.8719 10.4763 10.4424 10.4763 10.1034V8.13696L12.1715 9.89997H6.98422L5.62806 7.25545H13.426V10.3068C13.426 11.3013 12.9965 12.3411 12.1376 13.426C11.2787 14.5109 10.2955 15.4263 9.18798 16.1722C8.10306 16.9181 7.27806 17.291 6.71299 17.291Z" fill="#82CDFF"/>
        </svg>
        <span class="logo-title">KRCG Design Tools</span>
    </div>

    <div class="tools">
        <a href="/graphic" class="tool-card">
            <div class="tool-icon">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <rect x="3" y="3" width="18" height="18" rx="2" stroke="#82CDFF" stroke-width="1.5"/>
                    <path d="M3 16L8 11L12 15L16 10L21 16" stroke="#82CDFF" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
            </div>
            <span class="tool-name">Graphic Generator</span>
        </a>

        <a href="/pattern" class="tool-card">
            <div class="tool-icon">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M4 4H10V10H4V4Z" stroke="#82CDFF" stroke-width="1.5"/>
                    <path d="M14 4H20V10H14V4Z" stroke="#82CDFF" stroke-width="1.5"/>
                    <path d="M4 14H10V20H4V14Z" stroke="#82CDFF" stroke-width="1.5"/>
                    <path d="M14 14H20V20H14V14Z" stroke="#82CDFF" stroke-width="1.5"/>
                </svg>
            </div>
            <span class="tool-name">Pattern Generator</span>
        </a>
    </div>

    <div class="branding">
        <img src="Assets/graphic%20tool%20by%20typograaf.svg" alt="A Graphic Tool by Typograaf" style="height: 21px;">
    </div>
</body>
</html>
